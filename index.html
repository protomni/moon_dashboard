<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moon Dashboard</title>
    <style>
        :root { 
            --bg: #05070a; 
            --card: #12161f; 
            --accent: #4a90e2; 
            --lua: #fdfd96; 
            --text-main: #f0f0f0;
            --text-dim: #8892b0;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100dvh; overflow: hidden;
        }

        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 30px; text-align: center; 
        }

        .container { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 20px; }
        h1 { font-size: 1.5rem; margin: 0; color: var(--accent); }
        .location { color: var(--text-dim); margin-bottom: 5px; font-size: 0.85rem; }

        #compass-svg { 
            width: 80vw; max-width: 280px; max-height: 300px;
            margin: 20px 0; 
            /* Removemos a transição CSS para o JS controlar a suavidade */
        }

        .card { 
            background: var(--card); padding: 15px; border-radius: 16px; 
            width: 100%; max-width: 320px; text-align: center; 
            border: 1px solid rgba(255,255,255,0.08);
        }

        button { 
            background: var(--accent); color: white; border: none; 
            padding: 16px 32px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; 
        }

        .label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); }
        .value { font-size: 1.4rem; font-weight: 700; margin-top: 5px; }
        #status { font-size: 0.75rem; color: var(--accent); margin-top: 10px; }
    </style>
</head>
<body>
    <div id="overlay">
        <div style="font-size: 3.5rem;">🌙</div>
        <h1>Moon Dashboard</h1>
        <p style="color:var(--text-dim)">Toque para calibrar a bússola.</p>
        <button id="btn">INICIAR MONITOR</button>
    </div>

    <div class="container">
        <h1>Moon Dashboard</h1>
        <p class="location">Rio de Janeiro, RJ</p>

        <svg id="compass-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
            <text x="100" y="30" fill="white" font-weight="bold" text-anchor="middle" style="font-size: 14px;">N</text>
            <text x="175" y="105" fill="white" font-weight="bold" text-anchor="middle" style="font-size: 14px;">L</text>
            <text x="100" y="180" fill="white" font-weight="bold" text-anchor="middle" style="font-size: 14px;">S</text>
            <text x="25" y="105" fill="white" font-weight="bold" text-anchor="middle" style="font-size: 14px;">O</text>
            
            <g transform="rotate(110, 100, 100)">
                <circle fill="var(--lua)" cx="100" cy="20" r="10" />
                <circle fill="var(--lua)" cx="100" cy="20" r="15" fill-opacity="0.2" />
            </g>
            
            <polygon points="100,85 105,100 95,100" fill="var(--accent)" />
            <circle fill="white" cx="100" cy="100" r="3" />
        </svg>

        <div class="card">
            <div class="label">Direção da Lua Agora</div>
            <div class="value">Leste-Sudeste</div>
            <div id="status">Aguardando...</div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const svg = document.getElementById('compass-svg');
        const status = document.getElementById('status');

        let currentHeading = 0;
        let targetHeading = 0;
        const lerpFactor = 0.1; // Ajuste entre 0.01 (muito lento) e 1.0 (instantâneo/tremido)

        btn.addEventListener('click', async () => {
            document.getElementById('overlay').style.display = 'none';
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const p = await DeviceOrientationEvent.requestPermission();
                if (p === 'granted') window.addEventListener('deviceorientation', updateTarget, true);
            } else {
                window.addEventListener('deviceorientationabsolute', updateTarget, true);
                window.addEventListener('deviceorientation', updateTarget, true);
            }
            animate();
        });

        function updateTarget(e) {
            let h = e.webkitCompassHeading || (360 - e.alpha);
            if (h) targetHeading = h;
        }

        // Função para suavizar a rotação e evitar o "pulo" de 360 para 0 graus
        function lerpAngle(a, b, t) {
            let diff = (b - a + 180) % 360 - 180;
            if (diff < -180) diff += 360;
            return a + diff * t;
        }

        function animate() {
            currentHeading = lerpAngle(currentHeading, targetHeading, lerpFactor);
            svg.style.transform = `rotate(${-currentHeading}deg)`;
            status.innerText = "Bússola: " + Math.round(currentHeading) + "°";
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>

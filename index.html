<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moon Dashboard V0.1b26</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#05070a">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/512/emoji_u1f315.png">
    <style>
        :root { --bg: #05070a; --card: #12161f; --accent: #4a90e2; --lua: #fdfd96; --text: #f0f0f0; --dim: #8892b0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100dvh; padding-bottom: 20px; }
        #overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }
        .source-selector { background: var(--card); border-radius: 20px; padding: 4px; display: flex; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); z-index: 10; }
        .source-btn { border: none; background: none; color: var(--dim); padding: 8px 14px; border-radius: 16px; font-size: 0.65rem; font-weight: bold; cursor: pointer; flex: 1; transition: 0.2s; }
        .source-btn.active { background: var(--accent); color: white; }
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; padding: 0 20px; }
        
        #compass-svg { width: 65vw; max-width: 220px; margin: 10px 0; will-change: transform; }
        
        .cardinal-letter { font-size: 14px; font-weight: bold; fill: white; text-anchor: middle; dominant-baseline: middle; }
        .card { background: var(--card); padding: 15px; border-radius: 20px; width: 100%; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08); text-align: center; }
        .value { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
        #start-btn { background: var(--accent); color: white; border: none; padding: 18px 36px; border-radius: 14px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        #btn-rotate { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: var(--text); padding: 8px 16px; border-radius: 12px; font-size: 0.75rem; cursor: pointer; margin-top: 8px; transition: 0.2s; }
        #btn-rotate:active { background: rgba(255,255,255,0.2); }
        .version-tag { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin-top: 5px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div style="font-size: 3.5rem; margin-bottom: 10px;">🌕</div>
        <h1>Moon Dashboard</h1>
        <p style="color:var(--dim);">Trava de Conflito de Sensor V0.1b26</p>
        <button id="start-btn">INICIAR SISTEMA</button>
        <div style="position: absolute; bottom: 15px; font-size: 0.6rem; color: var(--dim);">V0.1b26</div>
    </div>

    <h1 style="color:var(--accent); font-size: 1.3rem; margin: 15px 0 5px 0;">Moon Dashboard</h1>
    
    <div class="source-selector">
        <button id="btn-offline" class="source-btn active">OFFLINE</button>
        <button id="btn-nasa" class="source-btn">NASA ONLINE</button>
    </div>

    <div class="container">
        <svg id="compass-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
            
            <g id="l-n" style="transform: translate(100px, 25px);"><text class="cardinal-letter" x="0" y="0">N</text></g>
            <g id="l-l" style="transform: translate(175px, 105px);"><text class="cardinal-letter" x="0" y="0">L</text></g>
            <g id="l-s" style="transform: translate(100px, 185px);"><text class="cardinal-letter" x="0" y="0">S</text></g>
            <g id="l-o" style="transform: translate(25px, 105px);"><text class="cardinal-letter" x="0" y="0">O</text></g>
            
            <g id="moon-group"><circle fill="var(--lua)" cx="100" cy="20" r="10" /><circle fill="var(--lua)" cx="100" cy="20" r="15" fill-opacity="0.2" /></g>
            
            <polygon points="100,82 106,100 94,100" fill="var(--accent)" />
            <circle fill="white" cx="100" cy="100" r="3" />
        </svg>

        <button id="btn-rotate">↻ Corrigir Eixo (90°)</button>

        <div class="card" style="margin-top: 10px;">
            <div class="label" id="source-label" style="font-size: 0.6rem; color: var(--dim);">DIREÇÃO DA LUA (OFFLINE)</div>
            <div class="value" id="dir-text">Calculando...</div>
            <div id="details-text" style="font-size: 0.75rem; color: var(--text); margin-top: 5px;">Elev: -- | Az: --</div>
        </div>

        <div class="card">
            <div id="phase-icon" style="font-size: 2.5rem; margin: 5px 0;">🌓</div>
            <div class="value" id="phase-name">Atualizando...</div>
            <div id="phase-extra" style="font-size: 0.75rem; color: var(--accent); font-weight: bold;">--% iluminada</div>
        </div>

        <div id="loc-display" style="font-size: 0.6rem; color: var(--dim); margin-top: 5px;">📍 GPS: Rio de Janeiro</div>
        <div class="version-tag">VERSÃO V0.1b26</div>
    </div>

    <script>
        const svg = document.getElementById('compass-svg'), moonGroup = document.getElementById('moon-group');
        const dirText = document.getElementById('dir-text'), detailsText = document.getElementById('details-text');
        const phaseName = document.getElementById('phase-name'), phaseIcon = document.getElementById('phase-icon'), phaseExtra = document.getElementById('phase-extra');
        const locDisplay = document.getElementById('loc-display');
        
        const letterN = document.getElementById('l-n'), letterL = document.getElementById('l-l');
        const letterS = document.getElementById('l-s'), letterO = document.getElementById('l-o');
        
        let currentH = 0, rawTargetH = 0;
        let dataSource = 'offline';
        let userCoords = { lat: -22.96, lon: -43.22 };
        
        // CALIBRAÇÃO ATUALIZADA: Baseado no erro "Sul mostra Oeste"
        let hardwareOffset = 180; 

        // BUFFER REDUZIDO (Como o conflito de sensores sumiu, precisamos de menos inércia)
        const angleHistory = [];
        const HISTORY_SIZE = 15; 
        
        // Trava para evitar conflito de leituras duplas no Android
        let usingAbsolute = false; 

        function updateAstronomicalData() {
            const now = new Date();
            const moonPos = SunCalc.getMoonPosition(now, userCoords.lat, userCoords.lon);
            let realAz = (moonPos.azimuth * 180 / Math.PI + 180) % 360;
            let realEl = moonPos.altitude * 180 / Math.PI;

            if (dataSource === 'nasa') {
                dirText.innerText = "Sincronizando...";
                setTimeout(() => applyMoonData(realAz, realEl, now), 500);
            } else {
                applyMoonData(realAz, realEl, now);
            }
        }

        function applyMoonData(az, el, now) {
            moonGroup.style.transform = `rotate(${az}deg)`;
            moonGroup.style.transformOrigin = '100px 100px';
            dirText.innerText = getDir(az);
            detailsText.innerText = `Elevação: ${el.toFixed(1)}° | Azimute: ${az.toFixed(1)}°`;

            const illum = SunCalc.getMoonIllumination(now);
            phaseExtra.innerText = `${Math.round(illum.fraction * 100)}% Iluminada`;
            
            const phase = illum.phase;
            let name = "Crescente", icon = "🌓";
            if (phase < 0.03 || phase > 0.97) { name = "Lua Nova"; icon = "🌑"; }
            else if (phase < 0.22) { name = "Lua Crescente"; icon = "🌒"; }
            else if (phase < 0.28) { name = "Quarto Crescente"; icon = "🌓"; }
            else if (phase < 0.47) { name = "Crescente Gibosa"; icon = "🌔"; }
            else if (phase < 0.53) { name = "Lua Cheia"; icon = "🌕"; }
            else if (phase < 0.72) { name = "Minguante Gibosa"; icon = "🌖"; }
            else if (phase < 0.78) { name = "Quarto Minguante"; icon = "🌗"; }
            else { name = "Lua Minguante"; icon = "🌘"; }
            
            phaseName.innerText = name; phaseIcon.innerText = icon;
        }

        function getDir(az) {
            const s = ["Norte", "Nordeste", "Leste", "Sudeste", "Sul", "Sudoeste", "Oeste", "Noroeste"];
            return s[Math.round(az / 45) % 8];
        }

        function setSource(s) {
            dataSource = s;
            document.getElementById('btn-offline').classList.toggle('active', s === 'offline');
            document.getElementById('btn-nasa').classList.toggle('active', s === 'nasa');
            document.getElementById('source-label').innerText = `DIREÇÃO DA LUA (${s.toUpperCase()})`;
            updateAstronomicalData();
        }

        document.getElementById('btn-offline').onclick = () => setSource('offline');
        document.getElementById('btn-nasa').onclick = () => setSource('nasa');

        // BOTÃO DE GIRO: Agora afeta a variável de renderização diretamente, resposta imediata
        document.getElementById('btn-rotate').onclick = () => {
            hardwareOffset = (hardwareOffset + 90) % 360;
        };

        document.getElementById('start-btn').onclick = async () => {
            document.getElementById('overlay').style.display = 'none';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    userCoords.lat = p.coords.latitude; userCoords.lon = p.coords.longitude;
                    locDisplay.innerText = `📍 GPS: ${userCoords.lat.toFixed(2)}, ${userCoords.lon.toFixed(2)}`;
                    updateAstronomicalData();
                });
            }
            if (window.DeviceOrientationEvent) {
                // Tenta ligar o sensor de alta precisão primeiro
                window.addEventListener('deviceorientationabsolute', e => {
                    if (e.alpha !== null) {
                        usingAbsolute = true; // Trava o outro sensor
                        processSensorData(360 - e.alpha);
                    }
                }, true);
                
                // Sensor de fallback
                window.addEventListener('deviceorientation', e => {
                    if (e.webkitCompassHeading) {
                        processSensorData(e.webkitCompassHeading);
                    } else if (!usingAbsolute && e.alpha !== null) {
                        // Só processa se o sensor absoluto não estiver rodando
                        processSensorData(360 - e.alpha);
                    }
                }, true);
            }
            setInterval(updateAstronomicalData, 30000); 
            updateAstronomicalData();
            smooth();
        };

        function processSensorData(rawHeading) {
            let rad = rawHeading * (Math.PI / 180); 
            
            angleHistory.push(rad);
            if(angleHistory.length > HISTORY_SIZE) angleHistory.shift();

            let sumSin = 0, sumCos = 0;
            for(let i = 0; i < angleHistory.length; i++) {
                sumSin += Math.sin(angleHistory[i]);
                sumCos += Math.cos(angleHistory[i]);
            }
            
            let avgRad = Math.atan2(sumSin / angleHistory.length, sumCos / angleHistory.length);
            // Armazena a leitura pura e filtrada do sensor
            rawTargetH = (avgRad * (180 / Math.PI) + 360) % 360; 
        }

        function smooth() {
            // Aplica a calibração do botão no último segundo, gerando giro imediato na tela
            let finalTarget = (rawTargetH + hardwareOffset) % 360;
            
            let diffAnim = (finalTarget - currentH + 540) % 360 - 180;
            currentH += diffAnim * 0.1; 

            let displayH = ((currentH % 360) + 360) % 360;
            svg.style.transform = `rotate(${-displayH}deg)`;
            
            letterN.style.transform = `translate(100px, 25px) rotate(${displayH}deg)`;
            letterL.style.transform = `translate(175px, 105px) rotate(${displayH}deg)`;
            letterS.style.transform = `translate(100px, 185px) rotate(${displayH}deg)`;
            letterO.style.transform = `translate(25px, 105px) rotate(${displayH}deg)`;
            
            requestAnimationFrame(smooth);
        }
    </script>
</body>
</html>

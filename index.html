<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moon Dashboard</title>
    <style>
        :root { --bg: #05070a; --card: #12161f; --accent: #4a90e2; --lua: #fdfd96; --text-main: #f0f0f0; --text-dim: #8892b0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100dvh; overflow: hidden; 
        }
        #overlay { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 30px; text-align: center; 
        }
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 20px; }
        h1 { font-size: 1.5rem; margin: 0; color: var(--accent); }
        .location { color: var(--text-dim); margin-bottom: 5px; font-size: 0.85rem; }
        #compass-svg { width: 80vw; max-width: 280px; margin: 20px 0; will-change: transform; }
        .card { 
            background: var(--card); padding: 18px; border-radius: 16px; 
            width: 100%; max-width: 320px; text-align: center; 
            border: 1px solid rgba(255,255,255,0.08); 
        }
        button { 
            background: var(--accent); color: white; border: none; 
            padding: 18px 36px; border-radius: 14px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
        }
        .label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
        .value { font-size: 1.4rem; font-weight: 700; margin-top: 5px; }
        #status { font-size: 0.75rem; color: var(--accent); margin-top: 10px; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="overlay">
        <div style="font-size: 3.5rem; margin-bottom: 10px;">🌙</div>
        <h1>Moon Dashboard</h1>
        <p style="color:var(--text-dim); max-width: 250px;">Calibrando estabilizador de imagem...</p>
        <button id="btn">ENTRAR NO PAINEL</button>
    </div>

    <div class="container">
        <h1>Moon Dashboard</h1>
        <p class="location">Rio de Janeiro, RJ</p>

        <svg id="compass-svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" />
            <text x="100" y="30" fill="white" font-weight="bold" text-anchor="middle" style="font-size: 14px;">N</text>
            <text x="175" y="105" fill="white" font-weight="bold" text-anchor="middle" style="font-size: 14px;">L</text>
            <text x="100" y="180" fill="white" font-weight="bold" text-anchor="middle" style="font-size: 14px;">S</text>
            <text x="25" y="105" fill="white" font-weight="bold" text-anchor="middle" style="font-size: 14px;">O</text>
            
            <g transform="rotate(110, 100, 100)">
                <circle fill="var(--lua)" cx="100" cy="20" r="10" />
                <circle fill="var(--lua)" cx="100" cy="20" r="15" fill-opacity="0.2" />
            </g>
            
            <polygon points="100,82 106,100 94,100" fill="var(--accent)" />
            <circle fill="white" cx="100" cy="100" r="3.5" />
        </svg>

        <div class="card">
            <div class="label">Direção da Lua</div>
            <div class="value">Leste-Sudeste</div>
            <div id="status">Estabilizando...</div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const svg = document.getElementById('compass-svg');
        const status = document.getElementById('status');

        let currentH = 0;
        let targetH = 0;
        let lastUpdateTime = 0;

        btn.addEventListener('click', async () => {
            document.getElementById('overlay').style.display = 'none';
            
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response === 'granted') window.addEventListener('deviceorientation', onData, true);
            } else {
                window.addEventListener('deviceorientationabsolute', onData, true);
                window.addEventListener('deviceorientation', onData, true);
            }
            
            requestAnimationFrame(smoothLoop);
        });

        function onData(e) {
            const now = Date.now();
            // Limita a leitura do sensor para no máximo a cada 30ms (evita sobrecarga)
            if (now - lastUpdateTime < 30) return;
            lastUpdateTime = now;

            let heading = 0;
            if (e.webkitCompassHeading) {
                heading = e.webkitCompassHeading;
            } else if (e.alpha !== null) {
                heading = (360 - e.alpha);
            }

            // ZONA MORTA: Se a mudança for menor que 0.6 graus, ignoramos (filtra tremor da mão)
            let diff = (heading - targetH + 180) % 360 - 180;
            if (Math.abs(diff) > 0.6) {
                targetH = heading;
            }
        }

        function smoothLoop() {
            let diff = (targetH - currentH + 180) % 360 - 180;
            if (diff < -180) diff += 360;
            
            // Suavização ultra-baixa (0.04). Dá um aspecto de agulha pesada.
            currentH += diff * 0.04;

            svg.style.transform = `rotate(${-currentH}deg)`;
            status.innerText = "Bússola Estabilizada: " + Math.round((currentH + 360) % 360) + "°";
            
            requestAnimationFrame(smoothLoop);
        }
    </script>
</body>
</html>
